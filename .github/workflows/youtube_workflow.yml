name: YouTube 播客深研情报引擎

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-youtube-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai

      - name: Run YouTube Tracker Script
        env:
          # 🚨 严格对齐你提供的 GitHub Secrets 命名规则
          SUPER_GROK_COOKIES:   ${{ secrets.SUPER_GROK_COOKIES }}
          FEISHU_WEBHOOK_URL:   ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }}
          FEISHU_WEBHOOK_URL_2: ${{ secrets.FEISHU_WEBHOOK_URL_2 }}
          FEISHU_WEBHOOK_URL_3: ${{ secrets.FEISHU_WEBHOOK_URL_3 }}
          SF_API_KEY:           ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          KIMI_API_KEY:         ${{ secrets.KIMI_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          PAT_FOR_SECRETS:      ${{ secrets.PAT_FOR_SECRETS }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          JIJYUN_WEBHOOK_URL:   ${{ secrets.JIJYUN_WEBHOOK_URL }}
          TWTAPI_KEY:           ${{ secrets.TWTAPI_KEY }}
          KIMI_TEMPERATURE:     "1.0"
          OPENROUTER_MODEL:     "anthropic/claude-3.7-sonnet"
        run: |
          python youtube_auto_task.py

      - name: Commit and push tracking state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yt_tracking.json
          git commit -m "chore: 自动更新 YouTube 追踪状态 [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
