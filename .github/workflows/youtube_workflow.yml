name: YouTube 播客深研情报引擎

on:
  
  # 允许在 GitHub 网页端 Actions 页面手动点击运行
  workflow_dispatch:

# 必须赋予写权限，以便脚本在运行后更新本地的 yt_tracking.json 状态文件
permissions:
  contents: write

jobs:
  run-youtube-tracker:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码仓库
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 配置 Python 3.10 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装依赖 (极简依赖：已剔除所有容易引起环境报错的组件)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      # 4. 执行核心自动化脚本
      - name: Run YouTube Tracker Script
        env:
          # 🚨 从 GitHub Secrets 动态读取密钥，请确保已在仓库 Settings 中配置
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python youtube_auto_task.py

      # 5. 自动保存"长期记忆"状态文件回代码仓库，实现频道淘汰机制
      - name: Commit and push tracking state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yt_tracking.json
          # 如果文件有变化就提交，没变化就安全跳过
          git commit -m "chore: 自动更新 YouTube 追踪与淘汰状态 [skip ci]" || echo "No changes to commit"
          git push
