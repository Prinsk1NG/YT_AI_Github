name: YouTube 播客深研情报引擎

on:
  # 每天北京时间早上 8:00 执行一次 (对应 UTC 时间 0:00)
  schedule:
    - cron: '0 0 * * *'
  # 允许在 GitHub 网页端 Actions 页面手动点击运行，或者通过 API (如 cron-job.org) 外部触发
  workflow_dispatch:

# 必须赋予写权限，以便脚本在运行后更新本地的 yt_tracking.json 状态文件
permissions:
  contents: write

# 🚨 强制 GitHub Actions 使用最新的 Node.js 24 引擎，消除废弃警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-youtube-tracker:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码仓库
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 配置 Python 3.10 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装极简依赖 (包含千问所需的 openai 官方 SDK)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai

      # 4. 执行核心自动化脚本
      - name: Run YouTube Tracker Script
        env:
          # 🚨 动态读取密钥 (已切换至千问 QWEN_API_KEY)
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JIJIANYUN_WEBHOOK_URL: ${{ secrets.JIJIANYUN_WEBHOOK_URL }}
        run: |
          python youtube_auto_task.py

      # 5. 自动保存状态文件 (加入 rebase 终极防冲突机制)
      - name: Commit and push tracking state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yt_tracking.json
          git commit -m "chore: 自动更新 YouTube 追踪与淘汰状态 [skip ci]" || echo "No changes to commit"
          # 🚨 核心修复：提交前先拉取远程最新代码进行合并，防止因为你手动改了代码导致推送失败
          git pull --rebase origin main
          git push
